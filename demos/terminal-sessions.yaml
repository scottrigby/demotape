title: terminal-sessions-demo
resolution: { w: 1920, h: 1080 }
voice: 0

# Demonstrates terminal `session:` continuity across non-contiguous steps.
#
# Two independent shells (`shell-A` and `shell-B`) stay visible in their
# panes for the entire demo. To keep a session's scrollback on screen
# during a step where it's not running new commands, declare `session: <id>`
# on the pane in that step too — with empty `actions: []`. The session
# tape covers every step from first to last appearance, so an "idle"
# slice still shows the accumulated scrollback.
#
# Constraint: all occurrences of one session must use the same pane size
# (different widths re-wrap scrollback differently). The renderer
# validates and errors loudly if you mix layouts.

# Piper would otherwise render "shell-A" as one word ("shella"); the
# pronunciations map respells it as two.
pronunciations:
  shell-A: "shell A"
  shell-B: "shell B"

steps:
  - id: shell-A-first
    narration: "Shell A starts up and runs its first command. Shell B is just sitting there."
    layout: 3-left
    panes:
      - type: browser
        actions:
          - goto: "https://github.com/scottrigby/showtape"
      - type: terminal
        session: shell-A
        actions:
          - type: "echo 'shell-A: command 1'"
          - enter: true
          - sleep_ms: 1500
      - type: terminal
        session: shell-B   # idle, but kept alive so its slot stays consistent
        actions: []

  - id: shell-A-continues
    narration: "Shell A continues. Both commands stay on screen."
    layout: 3-left
    panes:
      - type: browser
        actions:
          - goto: "https://huggingface.co/rhasspy/piper-voices"
      - type: terminal
        session: shell-A
        actions:
          - type: "echo 'shell-A: command 2'"
          - enter: true
          - sleep_ms: 1500
      - type: terminal
        session: shell-B
        actions: []

  - id: shell-B-first
    narration: "Now shell B runs a command. Shell A keeps its history visible the whole time."
    layout: 3-left
    panes:
      - type: browser
        actions:
          - goto: "https://github.com/charmbracelet/vhs"
      - type: terminal
        session: shell-A   # idle this step, but its prior scrollback stays on screen
        actions: []
      - type: terminal
        session: shell-B
        actions:
          - type: "echo 'shell-B: command 1'"
          - enter: true
          - sleep_ms: 1500

  - id: both-run
    narration: "And both shells run new commands together. Each one remembers everything it ran before."
    layout: 3-left
    pause_ms: 500
    panes:
      - type: browser
        actions:
          - goto: "https://github.com/scottrigby/showtape"
      - type: terminal
        session: shell-A
        actions:
          - type: "echo 'shell-A: command 3 — three commands now'"
          - enter: true
          - sleep_ms: 1500
      - type: terminal
        session: shell-B
        actions:
          - type: "echo 'shell-B: command 2 — two commands now'"
          - enter: true
          - sleep_ms: 1500
