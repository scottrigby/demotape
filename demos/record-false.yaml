title: record-false-demo
resolution: { w: 1920, h: 1080 }
speaker: 0

# Demonstrates record: false with wait_ms — a pure invisible pause.
#
# Story: a countdown runs visibly (1-3), then the recording pauses for
# 10 seconds. When it resumes, the terminal timestamps show the real
# elapsed time, making it obvious more time passed than the footage shows.
#
# Note: browser session: currently persists cookies/localStorage across
# steps but not the live page (that requires keeping the Playwright context
# alive, planned for v0.8.0). The terminal is the clearest way to show
# elapsed time for now.

steps:
  - id: start-countdown
    narration: "A countdown starts. The recording will pause invisibly between steps."
    end_buffer_ms: 1000
    panes:
      - type: browser
        session: web
        actions:
          - goto: "https://github.com/scottrigby/demotape"
      - type: terminal
        session: shell
        actions:
          - type: "echo 'Started at' $(date +%T)"
          - enter: true
          - sleep_ms: 300
          - paste: "for i in {1..3}; do printf 'tick %d  ' $i; sleep 1; done && echo done"
          - enter: true
          - sleep_ms: 4000   # wait for the 3-second loop to finish

  - id: pause
    record: false
    wait_ms: 10000    # 10-second invisible pause — no panes needed

  - id: resume
    narration: "Recording resumes. The timestamps show ten seconds just passed invisibly."
    end_buffer_ms: 2000
    panes:
      - type: browser
        session: web
        actions:
          - goto: "https://github.com/scottrigby/demotape"   # same page, browser session restored
      - type: terminal
        session: shell
        actions:
          - type: "echo 'Resumed at' $(date +%T)"
          - enter: true
          - sleep_ms: 500
          - type: "echo 'Countdown output above is still in scrollback'"
          - enter: true
