title: env-vars-demo
resolution: { w: 1920, h: 1080 }
speaker: 0

# How environment variable substitution works in demotape:
#
#   ${VAR_NAME}          required — demotape errors with a clear message if unset
#   ${VAR_NAME:-default} optional — uses the default value if VAR_NAME is not set
#
# Substitution applies to every string in the YAML — narration, action values,
# selectors, URLs — anything. The .env file in the same directory as the YAML is
# loaded automatically (shell environment takes precedence, so CI secrets always
# win over .env). Add .env to .gitignore and keep ${VAR} placeholders in the
# committed YAML so credentials never land in git.

pronunciations:
  demotape: "demo tape"
  dot-env: "dot en-vee"   # .env files: prevent "dot ten" mispronunciation

steps:
  - id: system-vars
    narration: "Any environment variable works in any YAML string. These come from the shell — no dot-env file needed."
    end_buffer_ms: 1000
    panes:
      - type: terminal
        session: shell
        actions:
          - paste: "grep -E 'HOME|SHELL|PWD' demos/env-vars.yaml"
          - enter: true
          - sleep_ms: 800
          - type: "echo 'HOME: ${HOME}'"
          - enter: true
          - sleep_ms: 200
          - type: "echo 'SHELL: ${SHELL}'"
          - enter: true
          - sleep_ms: 200
          - type: "echo 'PWD: ${PWD}'"
          - enter: true

  - id: dotenv-file
    narration: "Deploying ${DEMO_PROJECT} to ${DEMO_ENVIRONMENT}. These values come from the dot-env file next to this YAML — not hardcoded, not in git."
    end_buffer_ms: 1000
    panes:
      - type: terminal
        session: shell
        actions:
          - paste: "grep -E 'DEMO_' demos/env-vars.yaml"
          - enter: true
          - sleep_ms: 800
          - type: "echo 'DEMO_PROJECT: ${DEMO_PROJECT}'"
          - enter: true
          - sleep_ms: 200
          - type: "echo 'DEMO_ENVIRONMENT: ${DEMO_ENVIRONMENT}'"
          - enter: true
          - sleep_ms: 200
          - type: "echo 'DEMO_REGISTRY: ${DEMO_REGISTRY}'"
          - enter: true

  - id: defaults
    narration: "Variables with defaults render fine even when unset. The YAML shows the fallback syntax — the terminal shows what was actually used."
    end_buffer_ms: 1500
    panes:
      - type: terminal
        session: shell
        actions:
          - paste: "grep -E 'AWS_REGION|K8S_NAMESPACE|UNLIKELY' demos/env-vars.yaml"
          - enter: true
          - sleep_ms: 800
          - type: "echo 'AWS_REGION: ${AWS_REGION:-us-east-1}'"
          - enter: true
          - sleep_ms: 200
          - type: "echo 'K8S_NAMESPACE: ${K8S_NAMESPACE:-default}'"
          - enter: true
          - sleep_ms: 200
          - type: "echo 'UNLIKELY_TO_BE_SET: ${UNLIKELY_TO_BE_SET:-three}'"
          - enter: true
